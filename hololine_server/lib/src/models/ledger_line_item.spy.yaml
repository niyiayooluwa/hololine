class: LedgerLineItem
table: ledger_line_item
fields:
  workspaceId:   int
  ledgerId:      int
  ledger:        Ledger?,       relation(field=ledgerId, name=ledger_line_items, onDelete=Cascade)
  catalogId:     int
  catalogName:   String
  catalogSku:    String?
  unitPrice:     int
  quantity:      double
  unit:          String
  currency:      String,         default="NGN"
  subtotal:      int
  position:      int,            default=0
  createdAt:     DateTime

indexes:
  ledger_line_item_ledger_idx:
    fields: ledgerId
  ledger_line_item_workspace_catalog_idx:
    fields: workspaceId, catalogId
