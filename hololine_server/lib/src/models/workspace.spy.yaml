class: Workspace
table: workspace
fields:
    publicId: String
    name: String
    description: String
    parentId: int?, relation(parent=workspace)
    isPremium: bool, default=false
    createdAt: DateTime
    deletedAt: DateTime?
    archivedAt: DateTime?
    pendingDeletionUntil: DateTime?
    members: List<WorkspaceMember>?, relation(name=workspace_members)
indexes:
  workspace_public_id_idx:
    fields: publicId
    unique: true