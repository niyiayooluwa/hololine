class: Catalog
table: catalog
fields:
  workspaceId:    int
  name:           String
  type:           String
  sku:            String?
  unit:           String
  category:       String?
  weight:         double?
  minOrderQty:    double?
  price:          int
  currency:       String,         default="NGN"
  status:         String,         default="active"
  addedByName:    String
  addedById:      int?
  createdAt:      DateTime
  lastModifiedAt: DateTime
  inventory:      List<Inventory>?, relation(name=catalog_inventory)

indexes:
  catalog_workspace_idx:
    fields: workspaceId
  catalog_sku_workspace_idx:
    fields: workspaceId, sku
    unique: true
