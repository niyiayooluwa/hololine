class: Ledger
table: ledger
fields:
  workspaceId:      int
  referenceNumber:  String?
  transactionType:  TransactionType
  paymentStatus:    PaymentStatus
  totalAmount:      int
  currency:         String,         default="NGN"
  notes:      String?
  transactionAt:    DateTime
  createdByName:    String
  createdById:      int?
  counterpartyName: String?
  createdAt:        DateTime
  lastModifiedAt:   DateTime

indexes:
  ledger_workspace_idx:
    fields: workspaceId
  ledger_type_idx:
    fields: workspaceId, transactionType
